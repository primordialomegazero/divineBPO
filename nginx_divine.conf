# Divine BPO — NGINX Reverse Proxy
# HTTPS termination + load balancing

upstream divine_backend {
    server 127.0.0.1:8092;
    # Add more servers for load balancing:
    # server 127.0.0.1:8094;
    # server 127.0.0.1:8095;
}

upstream divine_ws {
    server 127.0.0.1:8093;
}

server {
    listen 80;
    server_name divine-bpo.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name divine-bpo.local;
    
    ssl_certificate /home/singularitynode/divine-bpo/certs/cert.pem;
    ssl_certificate_key /home/singularitynode/divine-bpo/certs/key.pem;
    
    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req zone=api_limit burst=20 nodelay;
    
    # API
    location /api/ {
        proxy_pass http://divine_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # WebSocket
    location /ws {
        proxy_pass http://divine_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
    
    # Dashboard
    location / {
        proxy_pass http://divine_backend;
        proxy_set_header Host $host;
    }
    
    # Metrics
    location /metrics {
        proxy_pass http://divine_backend;
    }
}
